name: CI Data Pipeline - Test Environment

# 1. Gatilho: Roda sempre que houver push para a branch do SCRUM-1 ou Pull Request para a main
on:
  push:
    branches: [ "feature/SCRUM-1-*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Executor Linux (custo otimizado)

    steps:
    # 2. Checkout do código do repositório
    - name: Checkout code
      uses: actions/checkout@v4

    # 3. Configuração do ambiente Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 4. Instalação de dependências (Pandas, Pytest, Boto3, etc.)
    - name: Install dependencies
    run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5. Validação de Sintaxe (Linter) - Garante que o supreme.py segue as boas práticas
    - name: Lint with flake8
      run: |
        # Para se o código tiver erros de sintaxe ou nomes não definidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 6. Execução de Testes Unitários
    - name: Run tests
      run: |
        # Aqui você rodaria seus testes de validação de schema ou lógica
        # Por enquanto, vamos apenas verificar se o script compila
        python supreme.py --test-mode